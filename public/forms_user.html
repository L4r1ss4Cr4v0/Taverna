<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./assets/css/styles.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=K2D:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800&display=swap"
      rel="stylesheet"
    />
    <title>Taverna</title>
  </head>
  <body class="bg-dark">
    <main
      id="main-form-users"
      class="d-flex justify-content-center align-items-center"
    >
      <div
        class="toast position-absolute"
        id="toast-container"
        role="alert"
        aria-live="assertive"
        aria-atomic="true"
        style="
          background-color: #1e1e2e;
          border: 1px solid #f59e0b;
          border-left: 4px solid #ef4444;
          border-radius: 8px;
          box-shadow: 0 4px 24px rgba(0, 0, 0, 0.5),
            0 0 0 1px rgba(245, 158, 11, 0.15);
          min-width: 280px;
        "
      >
        <div class="d-flex align-items-center p-3 gap-2">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="#ef4444"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            flex-shrink="0"
            style="flex-shrink: 0"
          >
            <circle cx="12" cy="12" r="10" />
            <line x1="12" y1="8" x2="12" y2="12" />
            <line x1="12" y1="16" x2="12.01" y2="16" />
          </svg>

          <div
            class="toast-body p-0 flex-grow-1"
            style="color: #f1f1f1; font-size: 0.875rem; font-weight: 500"
          >
            Mensagem de erro aqui
          </div>

          <button
            type="button"
            class="btn-close"
            data-bs-dismiss="toast"
            aria-label="Close"
            style="
              filter: invert(1) sepia(1) saturate(3) hue-rotate(5deg)
                brightness(1.2);
              opacity: 0.7;
            "
          ></button>
        </div>
      </div>
      <form
        class="w-50 gap-4 d-flex justify-content-center align-items-center flex-column"
        id="user-form"
      >
        <h2 class="mb-4">Login</h2>

        <div class="w-100">
          <label for="name" class="form-label">Nome</label>
          <input type="text" class="form-control" id="name" required />
        </div>
        <div class="w-100">
          <label for="password" class="form-label">Senha</label>
          <input type="text" class="form-control" id="password" required />
        </div>
        <div class="w-100 d-none" id="confirm-password-field">
          <label for="confirm-password" class="form-label"
            >Confirmar Senha</label
          >
          <input type="text" class="form-control" id="confirm-password" />
        </div>

        <div class="w-auto">
          <button id="login-btn" type="submit" class="btn fw-bold px-3 py-2">
            Fazer Login
          </button>
          <button
            id="resgiter-btn"
            type="button"
            class="btn fw-bold border border-warning text-warning px-3 py-2"
          >
            Registrar Usuário
          </button>
        </div>
      </form>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
      crossorigin="anonymous"
    ></script>

    <script type="module">
      import { addUser, login } from "./assets/js/cadastro_user.js";
      import { notify, renderHeader } from "./assets/js/utils.js";

      renderHeader();

      const userForm = document.querySelector("#user-form");
      const loginBtn = document.querySelector("#login-btn");
      const resgiterBtn = document.querySelector("#resgiter-btn");
      const confirmPwdField = document.querySelector("#confirm-password-field");

      userForm.addEventListener("submit", (e) => {
        e.preventDefault();

        const name = document.querySelector("#name").value;
        const pwd = document.querySelector("#password").value;
        const confirmPwd = document.querySelector("#confirm-password").value;

        if (resgiterBtn.type == "submit" && confirmPwd != "") {
          if (confirmPwd != pwd) {
            notify("As senhas não são iguais!");
            return;
          }

          addUser(name, pwd);
        }
        if (loginBtn.type == "submit") {
          login(name, pwd);
        }
      });

      resgiterBtn.addEventListener("click", () => {
        confirmPwdField.classList.remove("d-none");
        loginBtn.type = "button";
        resgiterBtn.type = "submit";
      });

      loginBtn.addEventListener("click", () => {
        confirmPwdField.classList.add("d-none");
        resgiterBtn.type = "button";
        loginBtn.type = "submit";
      });
    </script>
  </body>
</html>
