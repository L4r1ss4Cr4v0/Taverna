<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./assets/css/styles.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=K2D:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800&display=swap"
      rel="stylesheet"
    />
    <title>Taverna</title>
  </head>
  <body class="bg-dark">
    <header class="d-flex align-items-center">
      <a href="index.html#home">
        <img src="./assets/img/TavernaLogo.png" alt="Logo da Taverna" id="logo" />
      </a>
      <nav class="navbar navbar-expand-md navbar-dark">
        <div class="">
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav"
            aria-controls="navbarNav"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav text-white">
              <li class="nav-item">
                <a
                  class="nav-link active"
                  aria-current="page"
                  href="index.html#home"
                  >Home</a
                >
              </li>
              <li class="nav-item">
                <a class="nav-link active" href="index.html#about"
                  >Sobre o projeto</a
                >
              </li>
              <li class="nav-item">
                <a class="nav-link active" href="index.html#popular-drinks"
                  >Drinks Populares</a
                >
              </li>
              <li class="nav-item">
                <a class="nav-link active" href="index.html#catalog"
                  >Catálogo</a
                >
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>
    <main class="d-flex w-auto">
      <form class="w-50">
        <h2 class="mb-4">Cadastro de Drink</h2>

        <div class="row g-3">
          <div class="col-md-12">
            <label for="name" class="form-label">Nome</label>
            <input type="text" class="form-control" id="name" required />
          </div>

          <div class="col-12">
            <label for="shortDescription" class="form-label" >
              Descrição Curta
            </label>
            <input
              type="text"
              class="form-control"
              id="shortDescription"
              maxlength="120"
              required
            />
          </div>

          <div class="col-12">
            <label for="fullDescription" class="form-label">
              Descrição Completa
            </label>
            <textarea
              class="form-control"
              id="fullDescription"
              maxlength="200"
              required
            ></textarea>
          </div>

          <div class="col-md-4">
            <label for="image" class="form-label">URL da Imagem</label>
            <input type="url" class="form-control" id="image" required />
          </div>

          <div class="col-md-4">
            <label for="country" class="form-label">País</label>
            <input type="text" class="form-control" id="country" required />
          </div>
          
          <div class="col-md-4">
            <label for="difficultyLevel" class="form-label">
              Nível de Dificuldade
            </label>
            <input type="number" min="1" max="10" class="form-control" id="difficultyLevel" required />
          </div>

          <div class="col-md-12">
            <label for="tags" class="form-label">
              Tags (separadas por vírgula)
            </label>
            <input
              type="text"
              class="form-control"
              id="tags"
              placeholder="rum, hortelã, limão, refrescante"
            />
          </div>

          <div class="col-12">
            <label for="curiosity" class="form-label">Curiosidade</label>
            <textarea class="form-control" id="curiosity" rows="3"></textarea>
          </div>
        </div>

        <h4 class="mt-4">Receita</h4>

        <div class="mb-3">
          <label for="ingredients" class="form-label"> Ingredientes </label>
          <textarea
            class="form-control"
            id="ingredients"
            rows="6"
            placeholder="Um ingrediente por linha"
          ></textarea>
        </div>

        <div class="mb-3">
          <label for="preparationSteps" class="form-label">
            Modo de Preparo
          </label>
          <textarea
            class="form-control"
            id="preparationSteps"
            rows="6"
            placeholder="Um passo por linha"
          ></textarea>
        </div>

        <button id="submit-btn" type="submit" class="btn w-100 fw-bold">Salvar Drink</button>
      </form>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
      crossorigin="anonymous"
    ></script>

    <script src="./assets/js/cadastro_drink.js"></script>
  </body>
</html>
