<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/styles.css" />
    <title>Taverna</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=K2D:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800&display=swap"
      rel="stylesheet"
    />
  </head>

  <body class="bg-dark">
    <header class="d-flex align-items-center">
      <a href="index.html#home">
        <img src="img/TavernaLogo.png" alt="Logo da Taverna" id="logo" />
      </a>
        <nav class="navbar navbar-expand-md navbar-dark">
          <div class="">
            <button
              class="navbar-toggler"
              type="button"
              data-bs-toggle="collapse"
              data-bs-target="#navbarNav"
              aria-controls="navbarNav"
              aria-label="Toggle navigation"
            >
              <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
              <ul class="navbar-nav text-white">
                <li class="nav-item">
                  <a
                    class="nav-link active"
                    aria-current="page"
                    href="index.html#home"
                    >Home</a
                  >
                </li>
                <li class="nav-item">
                  <a
                    class="nav-link active"
                    href="index.html#about"
                    >Sobre o projeto</a
                  >
                </li>
                <li class="nav-item">
                  <a
                    class="nav-link active"
                    href="index.html#popular-drinks"
                    >Drinks Populares</a
                  >
                </li>
                <li class="nav-item">
                  <a
                    class="nav-link active"
                    href="index.html#catalog"
                    >Catálogo</a
                  >
                </li>
              </ul>
            </div>
          </div>
        </nav>
    </header>

    <main
      class="d-flex align-items-center justify-content-around"
      id="main-details"
    >
      <section id="drink-details">
        <h5>Descrição</h5>
        <p id="description"></p>
        <h5>Ingredientes</h5>
        <ul id="list-ingredients"></ul>
        <h5>Modo de preparo</h5>
        <ul id="list-steps"></ul>
      </section>
      <img src="" alt="" id="details-img" class="d-block" />
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
      crossorigin="anonymous"
    ></script>

    <script src="js/app.js"></script>

    <script>
      const params = new URLSearchParams(location.search);
      const id = params.get("id");

      const drink = findDrinkById(id);

      renderScreen(drink);
    </script>
  </body>
</html>
